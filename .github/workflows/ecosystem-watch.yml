name: MiSTer ecosystem watch

# One scan, one question: "has a core appeared in any of the 92 databases
# Update_All indexes that we have never triaged?" (audit_cores.py). New cores
# in the databases eventually need a CORE_NAME_MAPPING entry in the server.
#
# GitHub discovery moved out: unofficial-core discovery and installation live
# in chipster6502/MiSTer_unofficial_cores, and generic ecosystem watching in
# chipster6502/MiSTer_ecosystem. Both consume this repo's triage lists.
#
# This never sees a user's MiSTer: the runtime log at /status/unknown_cores
# stays on the device and is only ever shared if its owner chooses to paste it.
#
# Everything here yields LEADS. A .rbf filename is not a CORENAME —
# ZX-Spectrum.rbf announces itself as 'Spectrum'. Confirm before mapping.

on:
  schedule:
    - cron: '17 15 * * 5'    # Fridays 15:17 UTC = 17:17 CEST / 16:17 CET, so it
                             # lands mid-afternoon in Spain year round without
                             # chasing DST (cron is UTC and never shifts). The
                             # odd minute avoids the top-of-hour rush on
                             # GitHub's shared runners.
  workflow_dispatch:

permissions:
  contents: read
  issues: write              # the whole point: raise an issue when something is new

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan every database Update_All indexes
        id: dbs
        # Findings are information, not breakage, so the exit code is captured
        # instead of failing the job.
        run: |
          set +e
          python3 tools/audit_cores.py \
            --server MiSTer/Scripts/.config/mister_monitor/mister_status_server.py \
            --ino    mister_monitor_CYD28R_ILI9341/mister_monitor_CYD28R_ILI9341.ino \
            --ra     MiSTer/Scripts/.config/mister_monitor/ra_status.py \
            --baseline tools/known_cores.json \
            --json   /tmp/core_report.json \
            | tee /tmp/audit.txt
          # $? after a pipe is tee's status, not python's — PIPESTATUS[0] is the
          # one carrying "new cores found", and getting this wrong means the
          # issue is never raised.
          echo "found=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Keep the report for 90 days
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-watch
          path: |
            /tmp/core_report.json
            /tmp/audit.txt
          retention-days: 90

      - name: Report to the tracking issue
        if: steps.dbs.outputs.found == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = p => { try { return fs.readFileSync(p, 'utf8'); } catch { return ''; } };

            const parts = [];
            parts.push('### Databases: cores not yet triaged');
            parts.push('```');
            parts.push(read('/tmp/audit.txt').slice(0, 25000));
            parts.push('```');
            parts.push('---');
            parts.push('A `.rbf` name is a **lead, not a CORENAME**. Get the literal string');
            parts.push('from `/status/unknown_cores` on a machine running the core before');
            parts.push('adding any mapping. Once triaged, record it in `tools/known_cores.json`');
            parts.push('so it stops being reported.');
            parts.push('');
            parts.push(`_[Run log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) · full JSON in the run artifacts._`);

            const body = parts.join('\n');

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ecosystem-watch',
            });

            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'MiSTer ecosystem watch',
                labels: ['ecosystem-watch'],
                body,
              });
            }
