name: MiSTer ecosystem watch

# Two scans that answer different questions, reported together once a week.
#
#   audit_cores.py  — "has a core appeared in any of the 92 databases Update_All
#                      indexes that we have never triaged?"
#   scan_github.py  — "has someone published a MiSTer core that is in no
#                      database at all?"  (this is the z386 case: created
#                      2026-04-26, reached us as a user report months later)
#
# Neither reads any hardware. This never sees a user's MiSTer: the runtime log
# at /status/unknown_cores stays on the device and is only ever shared if its
# owner chooses to paste it.
#
# Everything here yields LEADS. A repo name is not a CORENAME, and neither is a
# .rbf filename — ZX-Spectrum.rbf announces itself as 'Spectrum'. Confirm before
# mapping.

on:
  schedule:
    - cron: '17 5 * * 1'     # Mondays 05:17 UTC; the odd minute avoids the
                             # top-of-hour rush on GitHub's shared runners
  workflow_dispatch:

permissions:
  contents: read
  issues: write              # the whole point: raise an issue when something is new

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan every database Update_All indexes
        id: dbs
        # Findings are information, not breakage, so the exit code is captured
        # instead of failing the job.
        run: |
          set +e
          python3 tools/audit_cores.py \
            --server MiSTer/Scripts/.config/mister_monitor/mister_status_server.py \
            --ino    mister_monitor_CYD28R_ILI9341/mister_monitor_CYD28R_ILI9341.ino \
            --ra     MiSTer/Scripts/.config/mister_monitor/ra_status.py \
            --baseline tools/known_cores.json \
            --json   /tmp/core_report.json \
            | tee /tmp/audit.txt
          # $? after a pipe is tee's status, not python's — PIPESTATUS[0] is the
          # one carrying "new cores found", and getting this wrong means the
          # issue is never raised.
          echo "found=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Scan GitHub for cores that are in no database
        id: gh
        env:
          # Lifts search from 10 req/min to 30. The default token is enough:
          # this only reads public search results.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 tools/scan_github.py \
            --days 8 \
            --baseline tools/known_repos.json \
            --json /tmp/github_report.json \
            | tee /tmp/github.txt
          echo "found=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Keep both reports for 90 days
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-watch
          path: |
            /tmp/core_report.json
            /tmp/github_report.json
            /tmp/audit.txt
            /tmp/github.txt
          retention-days: 90

      - name: Report to the tracking issue
        if: steps.dbs.outputs.found == '1' || steps.gh.outputs.found == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = p => { try { return fs.readFileSync(p, 'utf8'); } catch { return ''; } };

            const dbsNew = '${{ steps.dbs.outputs.found }}' === '1';
            const ghNew  = '${{ steps.gh.outputs.found }}' === '1';

            const parts = [];

            if (ghNew) {
              // Actionable and rare (~1-2 a week), so it leads and stays open.
              parts.push('### Published on GitHub, in no database');
              parts.push('```');
              parts.push(read('/tmp/github.txt').slice(0, 25000));
              parts.push('```');
              parts.push('');
            }

            if (dbsNew) {
              // Usually a longer list, so it is folded away: the issue stays
              // scannable and the detail is one click down.
              parts.push('<details><summary><b>Databases: cores not yet triaged</b></summary>');
              parts.push('');
              parts.push('```');
              parts.push(read('/tmp/audit.txt').slice(0, 25000));
              parts.push('```');
              parts.push('</details>');
              parts.push('');
            }

            parts.push('---');
            parts.push('A repo name and a `.rbf` name are both **leads, not CORENAMEs**.');
            parts.push('Get the literal string from `/status/unknown_cores` on a machine');
            parts.push('running the core before adding any mapping.');
            parts.push('');
            parts.push('Once triaged, record it so it stops being reported:');
            parts.push('`tools/known_cores.json` (databases) · `tools/known_repos.json` (GitHub).');
            parts.push('');
            parts.push(`_[Run log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) · full JSON in the run artifacts._`);

            const body = parts.join('\n');

            // Reuse one open issue rather than filing a new one every Monday.
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ecosystem-watch',
            });

            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'MiSTer ecosystem watch',
                labels: ['ecosystem-watch'],
                body,
              });
            }
