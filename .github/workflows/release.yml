name: Build and Release Firmware

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install cores
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json \
            https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli core install m5stack:esp32@3.3.7

      - name: Install libraries
        run: |
          arduino-cli lib install "M5Unified" "M5GFX" "JPEGDEC" "LovyanGFX" "XPT2046_Touchscreen"

      - name: Inject ScreenScraper credentials
        env:
          SS_DEV_ID:   ${{ secrets.SS_DEV_ID }}
          SS_DEV_PASS: ${{ secrets.SS_DEV_PASS }}
        run: |
          for d in mister_monitor_Tab5 mister_monitor_CYD28R mister_monitor_CYD28R_2USB mister_monitor_CYD35C mister_monitor_CYD35R; do
            printf '#pragma once\n#define SS_DEV_ID_EMBEDDED   "%s"\n#define SS_DEV_PASS_EMBEDDED "%s"\n' \
              "$SS_DEV_ID" "$SS_DEV_PASS" > "$d/ss_credentials.h"
          done

      - name: Compile Tab5
        run: |
          arduino-cli compile \
            --fqbn "m5stack:esp32:m5stack_tab5" \
            --output-dir build/tab5 \
            mister_monitor_Tab5

      - name: Compile CYD
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32:PartitionScheme=huge_app,FlashSize=4M,PSRAM=disabled" \
            --output-dir build/cyd \
            mister_monitor_CYD28R

      - name: Compile CYD 2USB
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32:PartitionScheme=huge_app,FlashSize=4M,PSRAM=disabled" \
            --output-dir build/cyd2usb \
            mister_monitor_CYD28R_2USB

      - name: Compile CYD35C
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32:PartitionScheme=huge_app,FlashSize=4M,PSRAM=disabled" \
            --output-dir build/cyd35c \
            mister_monitor_CYD35C

      - name: Compile CYD35R
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32:PartitionScheme=huge_app,FlashSize=4M,PSRAM=disabled" \
            --output-dir build/cyd35r \
            mister_monitor_CYD35R

      - name: Collect binaries
        run: |
          mkdir -p dist
          cp build/tab5/mister_monitor_Tab5.ino.merged.bin dist/mister_monitor_tab5.bin
          cp build/cyd/mister_monitor_CYD28R.ino.merged.bin   dist/mister_monitor_cyd.bin
          cp build/cyd2usb/mister_monitor_CYD28R_2USB.ino.merged.bin dist/mister_monitor_cyd2usb.bin
          cp build/cyd35c/mister_monitor_CYD35C.ino.merged.bin dist/mister_monitor_cyd35c.bin
          cp build/cyd35r/mister_monitor_CYD35R.ino.merged.bin dist/mister_monitor_cyd35r.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.bin
          body: |
            ## What's new in v2.6.0

            A **Game Info panel**, more reliable artwork detection through a
            reworked server state engine, and coverage for systems and launch
            methods that previously showed no artwork. Drop-in update: existing
            `config.ini` files keep working, and the new firmware falls back
            gracefully with an older server.

            ### New features
            - **Game Info panel** — a new page with year, developer, publisher, genre, players, rating and a scrolling synopsis for the current game, cached on the SD card so it loads instantly and offline. On all five boards.
            - **Name-based artwork search** — systems whose files carry no ScreenScraper-indexed hash now fall back to a name search, so they get artwork too.
            - **Configurable synopsis** — scroll speed and manual/auto mode set in `config.ini` (`[gameinfo]`); the synopsis re-fetches when you change the preferred language.

            ### Improvements
            - **Reworked load detection** — an event-driven server state machine reliably tells a real game load from OSD navigation, fixing cases where the display could freeze on the wrong state until a manual scan. Core and game are delivered atomically, so they never disagree.
            - **Clear "no artwork" status** — the screen explains why artwork is missing (core not in ScreenScraper, game not in the database, or game with no artwork) and stops retrying cases that can never succeed, saving quota.
            - Wider ScreenScraper system coverage and corrected mappings.

            ### Fixes
            - Correct handling of more launch layouts: arcade `.mra` from any folder, NEOGEO romsets, folder-per-game CD layouts, and MGL/CHD launches.
            - Tab5 (ESP32-P4) stability fixes and several HUD layout fixes.
            - On-screen ScreenScraper API error codes, with credentials redacted from logs.

            ### Notes
            - Screenshot capture over HTTP is available on the Tab5 and 2.8" CYD boards; the 3.5" (ST7796) panels don't support it (no SPI readback).
            - Existing `config.ini` files work unchanged; new keys use sensible defaults. New firmware pairs with older servers via a legacy fallback path.
      - name: Build flasher site
        run: |
          mkdir -p site/flasher
          cp docs/flasher/index.html site/flasher/
          cp dist/*.bin site/flasher/
          VER="${GITHUB_REF_NAME}"
          printf '{ "name": "MiSTer Monitor (CYD)", "version": "%s", "builds": [ { "chipFamily": "ESP32", "parts": [ { "path": "mister_monitor_cyd.bin", "offset": 0 } ] } ] }\n' "$VER" > site/flasher/manifest-cyd.json
          printf '{ "name": "MiSTer Monitor (CYD 2-USB / ST7789)", "version": "%s", "builds": [ { "chipFamily": "ESP32", "parts": [ { "path": "mister_monitor_cyd2usb.bin", "offset": 0 } ] } ] }\n' "$VER" > site/flasher/manifest-cyd2usb.json
          printf '{ "name": "MiSTer Monitor (Tab5)", "version": "%s", "builds": [ { "chipFamily": "ESP32-P4", "parts": [ { "path": "mister_monitor_tab5.bin", "offset": 0 } ] } ] }\n' "$VER" > site/flasher/manifest-tab5.json
          printf '{ "name": "MiSTer Monitor (CYD 3.5-inch capacitive)", "version": "%s", "builds": [ { "chipFamily": "ESP32", "parts": [ { "path": "mister_monitor_cyd35c.bin", "offset": 0 } ] } ] }\n' "$VER" > site/flasher/manifest-cyd35c.json
          printf '{ "name": "MiSTer Monitor (CYD 3.5-inch resistive)", "version": "%s", "builds": [ { "chipFamily": "ESP32", "parts": [ { "path": "mister_monitor_cyd35r.bin", "offset": 0 } ] } ] }\n' "$VER" > site/flasher/manifest-cyd35r.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4