name: Build and Release Firmware

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install cores
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json \
            https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli core install m5stack:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "M5Unified" "M5GFX" "JPEGDEC" "ArduinoJson" "LovyanGFX" "XPT2046_Touchscreen"

      - name: Inject ScreenScraper credentials
        env:
          SS_DEV_ID:   ${{ secrets.SS_DEV_ID }}
          SS_DEV_PASS: ${{ secrets.SS_DEV_PASS }}
        run: |
          for d in mister_monitor_Tab5 mister_monitor_CYD; do
            printf '#pragma once\n#define SS_DEV_ID_EMBEDDED   "%s"\n#define SS_DEV_PASS_EMBEDDED "%s"\n' \
              "$SS_DEV_ID" "$SS_DEV_PASS" > "$d/ss_credentials.h"
          done

      - name: Compile Tab5
        run: |
          arduino-cli compile \
            --fqbn "m5stack:esp32:m5stack_tab5" \
            --output-dir build/tab5 \
            mister_monitor_Tab5

      - name: Compile CYD
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32:PartitionScheme=huge_app,FlashSize=4M,PSRAM=disabled" \
            --output-dir build/cyd \
            mister_monitor_CYD

      - name: Collect binaries
        run: |
          mkdir -p dist
          cp build/tab5/mister_monitor_Tab5.ino.merged.bin dist/mister_monitor_tab5.bin
          cp build/cyd/mister_monitor_CYD.ino.merged.bin   dist/mister_monitor_cyd.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.bin

      - name: Build flasher site
        run: |
          mkdir -p site/flasher
          cp docs/flasher/index.html site/flasher/
          cp dist/*.bin site/flasher/
          VER="${GITHUB_REF_NAME}"
          printf '...' > site/flasher/manifest-cyd.json
          printf '...' > site/flasher/manifest-tab5.json
          VER="${GITHUB_REF_NAME}"
          printf '{ "name": "MiSTer Monitor (CYD)", "version": "%s", "builds": [ { "chipFamily": "ESP32", "parts": [ { "path": "mister_monitor_cyd.bin", "offset": 0 } ] } ] }\n' "$VER" > site/flasher/manifest-cyd.json
          printf '{ "name": "MiSTer Monitor (Tab5)", "version": "%s", "builds": [ { "chipFamily": "ESP32-P4", "parts": [ { "path": "mister_monitor_tab5.bin", "offset": 0 } ] } ] }\n' "$VER" > site/flasher/manifest-tab5.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4