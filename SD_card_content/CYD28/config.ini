; =============================================================================
; config.ini  —  MiSTer Monitor configuration file
; =============================================================================
; Place this file in the ROOT of the microSD card (/config.ini).
; Lines starting with ; or # are comments and are ignored.
; Keys are case-sensitive. Values are trimmed of surrounding whitespace.
; Any key that is absent keeps the built-in default shown in the comments.
; =============================================================================


; -----------------------------------------------------------------------------
[wifi]
; -----------------------------------------------------------------------------
ssid=YOUR_WIFI_SSID
password=YOUR_WIFI_PASSWORD


; -----------------------------------------------------------------------------
[mister]
; IP address of the MiSTer. LEAVE BLANK to auto-discover it on the LAN
; (recommended). Set it only as a fallback if your router blocks UDP broadcast.
ip=


; -----------------------------------------------------------------------------
[screenscraper]
; -----------------------------------------------------------------------------
; ss_user / ss_pass  Your free ScreenScraper member account.
; Create one in seconds at https://www.screenscraper.fr (no developer
; account needed — the app provides its own).
;
; Advanced: to use your OWN developer account instead of the built-in one,
; uncomment ss_dev_user / ss_dev_pass and fill them in.

ss_user=YOUR_SCREENSCRAPER_USERNAME
ss_pass=YOUR_SCREENSCRAPER_PASSWORD
;ss_dev_user=
;ss_dev_pass=

; Preferred artwork region: wor (world), us, eu, jp.
; Within each image type token, the region set here is tried FIRST.
; The remaining regions follow in fixed order, and the no-region generic
; variant is tried last.
; Example: region=eu tries (eu) first, then (wor), (us), (jp), then generic.
; Default: wor
region=wor

; HTTP timeout in ms for API requests. Default: 30000
timeout=30000

; Retry attempts on overload. Default: 2
retries=2

; Use HTTPS instead of HTTP. Only enable if HTTP stops working. Default: false
use_https=false


; -----------------------------------------------------------------------------
[gameinfo]
; -----------------------------------------------------------------------------
; GAME INFO panel: synopsis, year, publisher, developer, genre for the game
; in play. Metadata is fetched ONCE per game from ScreenScraper (during the
; artwork download, or on the first visit to the panel for games whose
; artwork was already cached) and stored on the microSD as a .meta file
; next to the game image. After that, the panel loads instantly and offline.

; Preferred language for synopsis and genre labels: en es pt fr de it
; Falls back to English when the preferred language is not available.
; Default: en
info_lang=en

; Synopsis memory cap: maximum characters stored per game (clamped 200-2000).
; This is a memory-safety limit, not a reading-length control: how much of a
; long synopsis you actually read is governed by the scroll keys below. Rarely
; needs changing; lower it only on a board very short on RAM.
; Default: 2000
info_synopsis_max=2000

; Synopsis auto-scroll speed: milliseconds per line (200-8000).
; Higher = slower. Only affects the synopsis, not other scrolling text.
; Default: 2000
info_scroll_step_ms=2000

; Synopsis auto-scroll on/off. When false, the synopsis is shown still (no
; auto-scroll) and the panel holds for 15 s before returning to the image.
; Default: true
info_scroll_auto=true

; Show the GAME INFO panel as part of the automatic image rotation, instead of
; only when you tap the GAME INFO button. The cycle becomes:
;   game artwork -> game info -> core artwork -> game artwork -> ...
; 30 s each, the same beat as the artwork slides.
; Only the fields page (1/2) is shown; touch the panel for the synopsis, which
; then behaves exactly as it does when opened by hand.
; Games with no metadata on ScreenScraper are skipped silently: the rotation
; stays on artwork rather than parking an empty panel on screen.
; Default: false
info_in_rotation=false


; -----------------------------------------------------------------------------
[images]
; -----------------------------------------------------------------------------
; SD card paths. Default: /cores  and  /cores/menu.jpg
base_path=/cores
default_image=/cores/menu.jpg

; How long (ms) to display a core image before switching to the game image.
; Default: 30000 (30 s)
core_image_timeout=30000

; Organise images in lettered subfolders (/cores/A/, /cores/B/, …). Default: true
alphabetical_folders=true

; Automatically download missing artwork from ScreenScraper. Default: true
auto_download=true

; Maximum file size (bytes) for a downloaded image. Default: 500000 (≈488 KB)
max_image_size=500000

; HTTP timeout (ms) for image downloads. Default: 30000
download_timeout=30000

; Force re-download even when a cached file already exists. Default: false
force_core_redownload=false
force_game_redownload=false


; ------------------------------------
; Media type search order
; ------------------------------------
; Each setting is a comma-separated list of tokens tried left to right until
; one downloads successfully. Remove a token to skip that type entirely.
; Reorder freely to match your personal taste.
;
; Available tokens
; ─────────────────────────────────────────────────────────────────────────────
;
; Wheel artwork (logo on a black background):
;   wheel-steel    Steel/metallic border  API: wheel-steel(wor/us/eu/jp)
;   wheel-carbon   Carbon fibre border    API: wheel-carbon(wor/us/eu/jp)
;   wheel          Plain/transparent      API: wheel(wor/us/eu/jp), wheel
;
; Box artwork:
;   box3d          3-D rendered box           API: box-3D(wor/us/eu/jp), box-3D
;   box2d          2-D flat box scan          API: box-2D(wor/us/eu/jp)
;
; Other types:
;   fanart         Fan art
;   marquee        Arcade cabinet marquee header
;   screenshot     In-game title screenshot   API: sstitle
;   photo          Real photograph of hardware
;   illustration   Hardware illustration
;   mix            MixRBV composite image     API: mixrbv(wor/us/eu/jp)
;
; Within each token, regions are tried in this order:
;   1. The region set in 'region=' above (tried first)
;   2. The remaining regions in fixed order (wor → us → eu → jp), skipping the preferred one
;   3. The generic variant with no region suffix (e.g. box-3D, wheel-steel)
;
; ─────────────────────────────────────────────────────────────────────────────
; Three separate lists for the three download contexts:
; ─────────────────────────────────────────────────────────────────────────────
;
; core_media_order              — system-level artwork (non-arcade systems).  Steel wheels look best here
;                               because they display cleanly on the black background.
;
; arcade_subsystem_media_order  — Arcade subsystem artwork (hardware platform, e.g. CPS1, Sega Classics):
;                               Subsystems are identified by their ScreenScraper system ID, not by game.
;                               Wheel art is the natural choice — these are platform logos, not game covers.
;
; arcade_media_order            — artwork for arcade games.  Most arcade titles
;                               have no physical box, so fanart/marquee art comes first.
;
; game_media_order              — artwork for non-arcade game ROMs (consoles, computers).
;                               Physical box art is the default first choice.
; ─────────────────────────────────────────────────────────────────────────────

; System/core artwork. Default: steel wheel → carbon wheel → plain wheel → photo
;                      → illustration → 3D box → 2D box → …
core_media_order=wheel-steel,wheel-carbon,wheel,photo,illustration,box3d,box2d,marquee,fanart,screenshot

; Arcade subsystem artwork. Default: steel wheel → carbon wheel → plain wheel
arcade_subsystem_media_order=wheel-steel,wheel-carbon,wheel

; Arcade game artwork. Default: fan art → marquee → carbon wheel → steel wheel
;                      → plain wheel → 3D box → 2D box → screenshot
arcade_media_order=fanart,marquee,wheel-carbon,wheel-steel,wheel,box3d,box2d,screenshot

; Non-arcade game artwork. Default: 3D box → 2D box → carbon wheel → steel wheel
;                           → plain wheel → fan art → marquee → screenshot
game_media_order=box3d,box2d,wheel-carbon,wheel-steel,wheel,fanart,marquee,screenshot


; -----------------------------------------------------------------------------
[ui]
; -----------------------------------------------------------------------------
; Scrolling text speed for long game/core names in the footer.

; ms between each character step. Lower = faster. Default: 300
scroll_speed_ms=300

; ms pause at the beginning of a scroll before it starts moving. Default: 2000
scroll_pause_start_ms=2000

; ms pause at the end of a scroll before it resets. Default: 3000
scroll_pause_end_ms=3000


; -----------------------------------------------------------------------------
[debug]
; -----------------------------------------------------------------------------
; Enable verbose debug output on the Serial monitor. Default: false
debug=false
